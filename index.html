<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>CLAIM BONUS FREESPIN</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Inter',sans-serif;
}

body{
    background: url("bg/gambar1.jpg") center/cover no-repeat;

    min-height:100vh;

    display:flex;
    justify-content:center;
    align-items:flex-start;

    padding:40px 20px;
    color:white;
}

.title{
    color:white;
    font-size:24px;
    margin-bottom:12px;
    letter-spacing:2px;
    text-align:center;
    text-shadow:0 4px 12px rgba(0,0,0,.4);

    position:relative;
    padding-bottom:2px;
}

.title::after{
    content:"";
    position:absolute;

    left:50%;
    bottom:0;

    transform:translateX(-50%);

    width:350px;
    height:3px;

    border-radius:10px;

    background:linear-gradient(
        90deg,
        transparent,
        #60a5fa,
        #ffffff,
        #60a5fa,
        transparent
    );

    box-shadow:
        0 0 10px rgba(96,165,250,0.7),
        0 0 18px rgba(255,255,255,0.35);
}

/* CONTAINER */

.container{
    width:100%;
    max-width:1100px;

}

/* TITLE */

.title{
    text-align:center;

    font-size:38px;
    font-weight:800;
    letter-spacing:2px;

    margin-bottom:30px;

    color:white;
}

/* MAIN BOX */

.main-box{
    background: url("bg/gambar33.jpg") center;
	border:1px solid #3b82f6;

    border-radius:24px;
	-webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    padding:25px;

    backdrop-filter:none;

    box-shadow:
    0 10px 35px rgba(0,0,0,0.35);
}

/* INPUT AREA */

.input-area{
    width:100%;
    min-height:180px;

    border-radius:18px;

    border:1px solid #3b82f6;

    background:#0b1220;

    padding:22px;

    font-size:18px;
    font-weight:500;

    color:white;

    resize:vertical;
    outline:none;

    margin-bottom:30px;

    text-align:center;

    box-shadow:
    inset 0 0 25px rgba(255,255,255,0.03),
    0 8px 20px rgba(0,0,0,0.25);
	
	display:flex;
	align-items:center;
	justify-content:center;
}


/* TABLE */

.table-wrapper{
    width:100%;
    overflow:hidden;      
    border-radius:18px;   
    margin-bottom:30px;
}

table{
    width:100%;
    table-layout: fixed;
    border:1px solid #3b82f6;
    border-spacing: 0;         
    background:white;
    color:#111827;
}

/* HEADER */

th{
    background:#0b1220;

    color:white;

    padding:16px 10px;

    font-size:13px;
    font-weight:700;

    text-align:center;

    border:1px solid rgba(255,255,255,0.08);
}

/* BODY */

td{
    height:70px;

    text-align:center;

    border:1px solid #e5e7eb;

    font-size:14px;
    font-weight:500;
}

tbody tr{
    transition:0.2s;
}

tbody tr:hover{
    background:#f8fafc;
}

/* BUTTON */

.copy-btn{
    position:relative;
    overflow:hidden;

    width:180px;
    height:50px;

    border:1px solid #3b82f6;
    border-radius:16px;

    background:linear-gradient(135deg,#1e3a8a,#0ea5e9);

    color:white;
    font-size:20px;
    font-weight:700;

    cursor:pointer;

    display:block;
    margin:0 auto;

    box-shadow:0 10px 25px rgba(37,99,235,0.35);
}

/* 🔥 garis shine tipis */
.copy-btn::before{
    content:"";
    position:absolute;
    top:0;
    left:-80%;

    width:35px;   /* 👈 ini yang bikin tidak tebal */
    height:100%;

    background:linear-gradient(
        120deg,
        transparent,
        rgba(255,255,255,0.15),
        transparent
    );

    transform:skewX(-20deg);
    animation:shineMove 2.8s linear infinite;
}

@keyframes shineMove{
    0%{
        left:-80%;
    }
    100%{
        left:140%;
    }
}

/* hover efek halus */
.copy-btn:hover{
    box-shadow:0 0 20px rgba(14,165,233,0.5),
               0 10px 25px rgba(0,0,0,0.25);
}

#copyBtn:active{
    opacity:0.92;
}

.copy-btn.success{

    background:linear-gradient(135deg,#16a34a,#22c55e) !important;

    border-color:#4ade80;

    box-shadow:
        0 12px 25px rgba(0,0,0,.3),
        0 0 20px rgba(34,197,94,.45);

}

@keyframes premiumShine{
    0%{
        left:-70%;
    }
    45%{
        left:140%;
    }
    100%{
        left:140%;
	}
	
}

/* MOBILE */

@media(max-width:768px){

    body{
        padding:20px 12px;
    }

    .title{
        font-size:28px;
    }

    .title::after{
        width:100px;
    }

    .note-box{
        font-size:13px;
        padding:14px;
    }

    .main-box{
        padding:18px;
    }

    .input-area{
        min-height:130px;
        font-size:22px;
    }

    th{
        font-size:11px;
        padding:12px 6px;
    }

    td{
        font-size:12px;
        height:60px;
    }

    .copy-btn{
        width:100%;
        font-size:18px;
    }

}


td input{
    width:100%;
    height:100%;

    border:none;
    outline:none;

    background:transparent;

    text-align:center;

    font-size:14px;
    font-weight:600;

    padding:10px;

    color:#111827;
}

td input::placeholder{
    color:#94a3b8;
}

td select{
    width:100%;
    height:100%;

    border:none;
    outline:none;

    background:white;   /* FIX penting */
    
    text-align:center;

    font-size:14px;
    font-weight:600;

    color:#111827;

    cursor:pointer;

    appearance:auto; /* biar arrow tetap muncul */
    padding:6px;
}

td{
    position:relative;
}

td select{
    background:white;
    border-radius:6px;
}

td select option{
    font-weight:600;
}


td select {
    background:white;
    color:#111827;
    opacity:1;
    visibility:visible;
}

thead tr:first-child th:first-child{
    border-top-left-radius:16px;
}

thead tr:first-child th:last-child{
    border-top-right-radius:16px;
}

tbody tr:last-child td:first-child{
    border-bottom-left-radius:16px;
}

tbody tr:last-child td:last-child{
    border-bottom-right-radius:16px;
}

/* © 2026 | BY YOGIK */
.brand{
    
    margin-top: 15px;
    text-align: center;
    color: #ffffff;
    text-shadow: 0 0 10px rgba(96,165,250,0.8);
    font-size: 11px;
    font-weight: bold;
}

</style>
</head>

</div>
<script>

const copyBtn = document.querySelector('.copy-btn');

copyBtn.addEventListener('click', async ()=>{

    const row = document.querySelector('tbody tr');
    const cells = row.querySelectorAll('td');

    const tanggal = cells[0].querySelector('input').value;
    const operator = cells[1].querySelector('select').value;
    const username = cells[2].querySelector('input').value;
    const provider = cells[3].querySelector('input').value;
    const game = cells[4].querySelector('input').value;
    const periode = cells[5].querySelector('input').value;
    const total = cells[6].querySelector('input').value;

    const bet = cells[7].querySelector('input').value;

    const mode = cells[8].querySelector('select').value.toUpperCase();

    const saldoAwal = '';

    const cleanTotal = total.replace(/,/g,'');
    const cleanBet = bet.replace(/,/g,'');
    const cleanSaldo = saldoAwal.replace(/,/g,'');

    const textRow =
    tanggal + '\t' +
    operator + '\t' +
    username + '\t' +
    provider + '\t' +
    game + '\t' +
    periode + '\t' +
    cleanTotal + '\t' +
    cleanBet + '\t' +
    mode;

    try {

        await navigator.clipboard.writeText(textRow);

        copyBtn.innerText = 'COPIED ✓';

copyBtn.classList.add('success');

setTimeout(()=>{

    copyBtn.innerText = 'COPY DATA';

    copyBtn.classList.remove('success');

},2000);

    } catch(err){

        alert('Copy gagal');

    }

});

</script>

<script>

const textarea = document.querySelector('.input-area');

textarea.addEventListener('input', function(){

    const lines = this.value.split('\n').map(l => l.trim()).filter(Boolean);

    if(lines.length < 10) return;

    const game = lines[0];
    const provider = lines[1];

    const periode = lines[2].split('-')[0].trim();

    const username = lines[4];

    const operator = lines[5]
        ? lines[5].split('-')[0].trim()
        : '';

    const tanggal = lines[6].split('-')[0].trim();

    const betSpin = (lines[8] || '')
        .replace(/[^0-9.]/g,'')
        .split('.')[0]
        .replace(/\B(?=(\d{3})+(?!\d))/g, ',');

    const modeSpin = (lines[7] || '').trim();

    const balanceLine = lines[9] || '';

    const match = balanceLine.match(/[\d,.]+/);

    let balanceAkhir = 0;

    if(match){

        balanceAkhir = parseInt(
            match[0]
            .replace(/,/g,'')
            .split('.')[0]
        );

    }

    const row = document.querySelector('tbody tr');

    const cells = row.querySelectorAll('td');

    cells[0].querySelector('input').value = tanggal;
    cells[1].querySelector('select').value = operator;
    cells[2].querySelector('input').value = username;
    cells[3].querySelector('input').value = provider;
    cells[4].querySelector('input').value = game;
    cells[5].querySelector('input').value = periode;

    // TOTAL MENANG kosong dulu
    cells[6].querySelector('input').value = '';

    cells[7].querySelector('input').value = '';

    cells[8].querySelector('select').value = modeSpin;
	cells[9].querySelector('input').value = '';

    // simpan balance akhir
    cells[6].querySelector('input').dataset.balance = balanceAkhir;

});


// AUTO HITUNG TOTAL MENANG
const saldoInput = document.querySelectorAll('tbody tr td input')[7];

saldoInput.addEventListener('input', function(){

    const row = document.querySelector('tbody tr');
    const cells = row.querySelectorAll('td');

    const totalCell = cells[6].querySelector('input');

    const balanceAkhir = parseInt(
        totalCell.dataset.balance || 0
    );

    const saldoAwal = parseInt(
        this.value.replace(/,/g,'') || 0
    );

    const hasil = balanceAkhir - saldoAwal;

    totalCell.value = hasil > 0
        ? hasil.toLocaleString('en-US')
        : '';

});
</script>

<!-- 🔥 TAMBAHKAN SCRIPT BARU DI SINI (MASIH DALAM BODY) -->
<script>
const saldoAwalInput = document.querySelector('tbody tr td:last-child input');

saldoAwalInput.addEventListener('input', function () {
    let value = this.value.replace(/,/g, '').replace(/[^0-9]/g, '');

    if (!value) {
        this.value = '';
        return;
    }

    this.value = value.replace(/\B(?=(\d{3})+(?!\d))/g, ',');
});
</script>

<script>
function formatRibuan(input) {
    let value = input.value.replace(/,/g, '').replace(/[^0-9]/g, '');

    if (!value) {
        input.value = '';
        return;
    }

    input.value = value.replace(/\B(?=(\d{3})+(?!\d))/g, ',');
}

document.addEventListener('DOMContentLoaded', function () {

    // BET SPIN saja (pakai class biar pasti benar)
    const betSpinInput = document.querySelector('.bet-spin');

    if (betSpinInput) {
        betSpinInput.addEventListener('input', function () {
            formatRibuan(this);
        });
    }

});
</script>
